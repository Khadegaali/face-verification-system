<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Register & Upload ID</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      text-align: center;
      padding-top: 60px;
    }

    h2 {
      color: #333;
    }

    form {
      background-color: #fff;
      display: inline-block;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      text-align: left;
      margin-top: 15px;
      font-weight: bold;
      color: #444;
    }

    input[type="text"],
    input[type="email"],
    input[type="file"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      margin-top: 20px;
      padding: 10px 25px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .note {
      font-size: 14px;
      color: #777;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2> Register & Upload Your ID</h2>

  <form action="/register" method="post" enctype="multipart/form-data">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" required>

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email" placeholder="example@email.com" required>

    <label for="id_image">Upload your ID (jpg/png):</label>
    <input type="file" id="id_image" name="id_image" accept=".jpg,.jpeg,.png" required>

    <button type="submit">Submit & Continue</button>
  </form>

  <p class="note">After uploading your ID, you’ll be redirected to the face verification page.</p>
</body>
</html>
