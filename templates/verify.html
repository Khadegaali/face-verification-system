<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Face Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f9f9f9;
    }
    h2 {
      color: #333;
    }
    img {
      margin: 20px auto;
      display: block;
      border-radius: 10px;
      border: 2px solid #ccc;
      width: 280px;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    #status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #444;
    }
  </style>
</head>
<body>
  <h2>Welcome, {{ name }} ({{ email }})</h2>
 <p>Your ID image:</p>
<img src="{{ url_for('uploaded_file', filename=id_image.split('/')[-1]) }}" width="250" alt="User ID Image">


  <button id="startBtn">Start Camera Verification</button>
  <p id="status"></p>

  <script>
    document.getElementById("startBtn").addEventListener("click", async function() {
      document.getElementById("status").innerText = " Opening camera... please allow access";
      
      const form = new FormData();
      form.append("user_id", "{{ user_id }}");
      form.append("timeout", "12");        // duration to try capturing (in seconds)
      form.append("frame_interval", "6");  // process every N frames

      try {
        const res = await fetch("/start_camera_verify", { 
          method: "POST", 
          body: form 
        });
        const data = await res.json();

        if (data.error) {
          document.getElementById("status").innerText = " Error: " + data.error;
          document.getElementById("status").style.color = "red";
        } else {
          const msg = ` Result: ${data.status || data.result} | Distance: ${data.distance ? data.distance.toFixed(3) : "-"}`;
          document.getElementById("status").innerText = msg;
          if ((data.status || data.result) === "REAL") {
            document.getElementById("status").style.color = "green";
          } else {
            document.getElementById("status").style.color = "red";
          }
        }
      } catch (err) {
        document.getElementById("status").innerText = " Error connecting to server: " + err;
        document.getElementById("status").style.color = "orange";
      }
    });
  </script>
</body>
</html>
